<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avyron</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.splash-container {
  text-align: center;
  color: #8B0000;
  display: flex;
  flex-direction: column;   /* stack vertically */
  justify-content: center;  /* vertical alignment inside container */
  align-items: center;      /* horizontal alignment */
  height: 100%;             /* take full height */
}

.splash-image {
  width: 180px;
  opacity: 0;
  transform: scale(0.8);
  animation: imageAppear 1s forwards;
}

@keyframes imageAppear {
  to { opacity: 1; transform: scale(1); }
}

.brand {
  font-size: 60px;
  white-space: nowrap;
  overflow: hidden;
  margin: 10px 0 0 0; /* top margin smaller */
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-8px); }
  80% { transform: translateX(8px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: shake 0.4s;
  border-color: red !important;
}

.tagline {
  font-size: 24px;
  opacity: 0;
  animation: fadeIn 1s 2s forwards;
  margin-top: 10px;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.creator {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  color: #555;
}

/* Entry Gate */
#entryGate {
  display: none;
  flex-direction: column;
  align-items: center;
  color: #8B0000;
}

#entryGate input {
  padding: 10px;
  font-size: 16px;
  margin: 10px 0;
  border: 2px solid #8B0000;
  border-radius: 5px;
  display: inline-block;
  box-sizing: border-box;
  caret-color: transparent; /* hide cursor */
}

#entryGate button {
  padding: 10px 20px;
  font-size: 16px;
  background: #8B0000;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#entryGate button:hover {
  background: #a00000;
}

#errorMsg {
  color: red;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="splash-container" id="splash">
  <img src="1771560256831.png" class="splash-image">
  <div class="brand" id="brand"></div>
  <div class="tagline">Crafted to Rise</div>
</div>

<div id="entryGate">
  <h2>Enter Password</h2>
  <input type="password" id="passwordInput" placeholder="Enter password">
  <button onclick="checkPassword()">Submit</button>
  <div id="errorMsg"></div>
</div>

<div class="creator">
  Creator Tonmoy Kumar Deb<br>
  Made in Lachit Nagar, Assam.
</div>

<script>
// ---------------- IndexedDB ----------------
let db;
let request = indexedDB.open("AvyronDB", 1);

request.onupgradeneeded = function(e) {
  db = e.target.result;
  db.createObjectStore("passwordStore");
};

request.onsuccess = function(e) {
  db = e.target.result;
};

// ---------------- Splash → Typewriting → Entry Gate ----------------
const brandText = "Avyron";
const brandDiv = document.getElementById("brand");
let i = 0;

function typeWriter() {
  if (i < brandText.length) {
    brandDiv.innerHTML += brandText.charAt(i);
    i++;
    setTimeout(typeWriter, 250); // letter speed
  }
}

// Start typewriting after image fade-in
setTimeout(typeWriter, 500);

// Show entry gate after typewriting + tagline
setTimeout(showEntryGate, 3500);

function showEntryGate() {
  document.getElementById("splash").style.display = "none";
  document.getElementById("entryGate").style.display = "flex";
}

// ---------------- Password Check ----------------
function checkPassword() {
  let inputBox = document.getElementById("passwordInput");
  let inputPwd = inputBox.value;
  let errorMsg = document.getElementById("errorMsg");

  if (!inputPwd) {
    errorMsg.innerText = "Please enter password.";
    setTimeout(() => { errorMsg.innerText = ""; }, 1900);
    return;
  }

  let tx = db.transaction("passwordStore", "readonly");
  let store = tx.objectStore("passwordStore");
  let getReq = store.get("userPassword");

  getReq.onsuccess = function() {
    if (!getReq.result) {
      // First-time user → save password
      let tx2 = db.transaction("passwordStore", "readwrite");
      let store2 = tx2.objectStore("passwordStore");
      store2.put(inputPwd, "userPassword");

      tx2.oncomplete = function() {
        window.location.href = "home.html";
      };

    } else {
      // Returning user → check match
      if (getReq.result === inputPwd) {
        window.location.href = "home.html";
      } else {
        // Wrong password → shake + vibrate + clear + temporary error
        errorMsg.innerText = "Incorrect password!";
        inputBox.value = "";

        // Shake animation
        inputBox.classList.remove("shake");
        void inputBox.offsetWidth;
        inputBox.classList.add("shake");

        // Mobile vibration
        if (navigator.vibrate) {
          navigator.vibrate([100, 50, 100]);
        }

        // Remove message after 1.9s
        setTimeout(() => { errorMsg.innerText = ""; }, 1900);
      }
    }
  };

  getReq.onerror = function() {
    errorMsg.innerText = "Error accessing storage!";
    setTimeout(() => { errorMsg.innerText = ""; }, 1900);
  };
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avyron</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.splash-container {
  text-align: center;
  color: #8B0000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100%;
}

.splash-image {
  width: 180px;
  opacity: 0;
  transform: scale(0.8);
  animation: imageAppear 1s forwards;
}

@keyframes imageAppear {
  to { opacity: 1; transform: scale(1); }
}

.brand {
  font-size: 60px;
  margin: 10px 0 0 0;
  white-space: nowrap;
  overflow: hidden;
}

.shake {
  animation: shake 0.4s;
  border-color: red !important;
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-8px); }
  80% { transform: translateX(8px); }
  100% { transform: translateX(0); }
}

.tagline {
  font-size: 24px;
  opacity: 0;
  transition: opacity 1s ease;
  margin-top: 10px;
}

.creator {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  color: #555;
}

/* Entry Gate */
#entryGate {
  display: none;
  flex-direction: column;
  align-items: center;
  color: #8B0000;
}

#entryGate input {
  padding: 10px;
  font-size: 16px;
  margin: 10px 0;
  border: 2px solid #8B0000;
  border-radius: 5px;
  display: inline-block;
  box-sizing: border-box;
  caret-color: transparent;
}

#entryGate button {
  padding: 10px 20px;
  font-size: 16px;
  background: #8B0000;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#entryGate button:hover {
  background: #a00000;
}

#errorMsg {
  color: red;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="splash-container" id="splash">
  <img src="1771560256831.png" class="splash-image">
  <div class="brand" id="brand"></div>
  <div class="tagline">Crafted to Rise</div>
</div>

<div id="entryGate">
  <h2>Enter Password</h2>
  <input type="password" id="passwordInput" placeholder="Enter password">
  <button onclick="checkPassword()">Submit</button>
  <div id="errorMsg"></div>
</div>

<div class="creator">
  Creator Tonmoy Kumar Deb<br>
  Made in Lachit Nagar, Assam.
</div>

<script>
// ---------------- IndexedDB ----------------
let db;
let request = indexedDB.open("AvyronDB", 1);
request.onupgradeneeded = function(e) {
  db = e.target.result;
  db.createObjectStore("passwordStore");
};
request.onsuccess = function(e) {
  db = e.target.result;
};

// ---------------- Splash + Typewriter + Tagline ----------------
document.addEventListener("DOMContentLoaded", function() {
  const brandDiv = document.getElementById("brand");
  const taglineDiv = document.querySelector(".tagline");
  const brandText = "Avyron";
  let i = 0;

  function typeWriter() {
    if (i < brandText.length) {
      brandDiv.innerHTML += brandText.charAt(i);
      i++;
      setTimeout(typeWriter, 250); // 250ms per letter
    } else {
      // Fade-in tagline after typing finishes
      taglineDiv.style.opacity = 1;
    }
  }

  // Start typing 0.5s after splash appears
  setTimeout(typeWriter, 500);

  // Show entry gate after 5 seconds (splash duration)
  setTimeout(showEntryGate, 5000);
});

function showEntryGate() {
  document.getElementById("splash").style.display = "none";
  document.getElementById("entryGate").style.display = "flex";
}

// ---------------- Password Check ----------------
function checkPassword() {
  const inputBox = document.getElementById("passwordInput");
  const inputPwd = inputBox.value;
  const errorMsg = document.getElementById("errorMsg");

  if (!inputPwd) {
    errorMsg.innerText = "Please enter password.";
    setTimeout(() => { errorMsg.innerText = ""; }, 1900);
    return;
  }

  const tx = db.transaction("passwordStore", "readonly");
  const store = tx.objectStore("passwordStore");
  const getReq = store.get("userPassword");

  getReq.onsuccess = function() {
    if (!getReq.result) {
      // First-time user → save password
      const tx2 = db.transaction("passwordStore", "readwrite");
      const store2 = tx2.objectStore("passwordStore");
      store2.put(inputPwd, "userPassword");
      tx2.oncomplete = function() {
        window.location.href = "home.html";
      };
    } else {
      if (getReq.result === inputPwd) {
        window.location.href = "home.html"; // correct password
      } else {
        // Wrong password → shake + vibrate + clear + temporary error
        errorMsg.innerText = "Incorrect password!";
        inputBox.value = "";

        inputBox.classList.remove("shake");
        void inputBox.offsetWidth;
        inputBox.classList.add("shake");

        if (navigator.vibrate) {
          navigator.vibrate([100, 50, 100]);
        }

        setTimeout(() => { errorMsg.innerText = ""; }, 1900);
      }
    }
  };

  getReq.onerror = function() {
    errorMsg.innerText = "Error accessing storage!";
    setTimeout(() => { errorMsg.innerText = ""; }, 1900);
  };
}
</script>

</body>
</html>

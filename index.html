<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avyron</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.splash-container {
  text-align: center;
  color: #8B0000;
}

.splash-image {
  width: 180px;
  opacity: 0;
  transform: scale(0.8);
  animation: imageAppear 1s forwards;
}

@keyframes imageAppear {
  to { opacity: 1; transform: scale(1); }
}

.brand {
  font-size: 60px;
  margin-top: 20px;
  white-space: nowrap;
  overflow: hidden;
  animation: typing 1.5s steps(7) forwards;
}

@keyframes typing {
  to { width: 7ch; }
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-8px); }
  80% { transform: translateX(8px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: shake 0.4s;
  border-color: red !important;
}

.tagline {
  font-size: 24px;
  opacity: 0;
  animation: fadeIn 1s 1.5s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.creator {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  color: #555;
}

/* Entry Gate */
#entryGate {
  display: none;
  flex-direction: column;
  align-items: center;
  color: #8B0000;
}

#entryGate input {
  padding: 10px;
  font-size: 16px;
  margin: 10px 0;
  border: 2px solid #8B0000;
  border-radius: 5px;
  display: inline-block; /* ADD THIS */
  box-sizing: border-box; /* optional */
}

#entryGate button {
  padding: 10px 20px;
  font-size: 16px;
  background: #8B0000;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#entryGate button:hover {
  background: #a00000;
}

#errorMsg {
  color: red;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="splash-container" id="splash">
  <img src="1771560256831.png" class="splash-image">
  <div class="brand">Avyron</div>
  <div class="tagline">Crafted to Rise</div>
</div>

<div id="entryGate">
  <h2>Enter Password</h2>
  <input type="password" id="passwordInput" placeholder="Enter password">
  <button onclick="checkPassword()">Submit</button>
  <div id="errorMsg"></div>
</div>

<div class="creator">
  Creator Tonmoy Kumar Deb<br>
  Made in Lachit Nagar, Assam.
</div>

<script>
let db;

let request = indexedDB.open("AvyronDB", 1);

request.onupgradeneeded = function(e) {
  db = e.target.result;
  db.createObjectStore("passwordStore");
};

request.onsuccess = function(e) {
  db = e.target.result;
};

setTimeout(showEntryGate, 2500);

function showEntryGate() {
  document.getElementById("splash").style.display = "none";
  document.getElementById("entryGate").style.display = "flex";
}

function checkPassword() {
  let inputPwd = document.getElementById("passwordInput").value;
  let errorMsg = document.getElementById("errorMsg");

  if (!inputPwd) {
    errorMsg.innerText = "Please enter password.";
    return;
  }

  let tx = db.transaction("passwordStore", "readonly");
  let store = tx.objectStore("passwordStore");
  let getReq = store.get("userPassword");

  getReq.onsuccess = function() {

    if (!getReq.result) {
      // First-time user → save password
      let tx2 = db.transaction("passwordStore", "readwrite");
      let store2 = tx2.objectStore("passwordStore");
      store2.put(inputPwd, "userPassword");

      tx2.oncomplete = function() {
        window.location.href = "home.html"; // redirect after saving
      };

    } else {
      // Returning user → check match
      if (getReq.result === inputPwd) {
        window.location.href = "home.html"; // correct password
      } else {
        // Wrong password → shake + vibrate + temporary error message
        errorMsg.innerText = "Incorrect password!";

        // Remove message after 1.9 seconds
        setTimeout(function() {
          errorMsg.innerText = "";
        }, 1900);

        let inputBox = document.getElementById("passwordInput");

        // Shake effect
        inputBox.classList.remove("shake"); // remove previous if any
        void inputBox.offsetWidth;           // force reflow to restart animation
        inputBox.classList.add("shake");     // trigger shake

        // Mobile vibration
        if (navigator.vibrate) {
          navigator.vibrate([100, 50, 100]); // vibrate pattern
        }
      }
    }
  };

  getReq.onerror = function() {
    errorMsg.innerText = "Error accessing storage!";
    setTimeout(function() {
      errorMsg.innerText = "";
    }, 1900);
  };
}
</script>

</body>
  </html>
